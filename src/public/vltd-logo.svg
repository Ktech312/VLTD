  <!-- Chrome Gradient -->
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="25%" stop-color="#A8A8A8"/>
      <stop offset="55%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#7A7A7A"/>
